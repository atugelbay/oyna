# Пример для Ubuntu: положить в /etc/nginx/sites-available/oyna и сделать symlink в sites-enabled.
# Замените crm.example.com и api.example.com на ваши поддомены (A-записи на IP VPS в Namecheap).
#
# После проверки конфига:
#   sudo nginx -t && sudo systemctl reload nginx
# SSL:
#   sudo certbot --nginx -d crm.example.com -d api.example.com

upstream oyna_next {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream oyna_api {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name crm.example.com;

    location / {
        proxy_pass http://oyna_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://oyna_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
